%YAML 1.2
---
$id: http://devicetree.org/schemas/remoteproc/qcom,ipq8074-wcss-pil.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: Qualcomm IPQ WCSS Peripheral Image Loader

maintainers:
  - Bjorn Andersson <andersson@kernel.org>
  - Alexandru Gagniuc <mr.nuke.me@gmail.com>

description:
  The IPQ WCSS peripheral image loader is used to load firmware on the Qualcomm
  Q6 processor that exposes WiFi-6 devices to the OS via the AHB bus. It is
  generally used by ath11k to start up the wireless firmware.

properties:
  compatible:
    enum:
      - qcom,ipq8074-wcss-pil
      - qcom,ipq9574-wcss-pil
      - qcom,qcs404-wcss-pil

  reg:
    maxItems: 2

  reg-names:
    items:
      - const: qdsp6
      - const: rmb

  interrupts:
    maxItems: 5

  interrupt-names:
    items:
      - const: wdog
      - const: fatal
      - const: ready
      - const: handover
      - const: stop-ack

  resets:
    maxItems: 3

  reset-names:
    items:
      - const: wcss_aon_reset
      - const: wcss_reset
      - const: wcss_q6_reset

  clocks:
    minItems: 10
    maxItems: 13

  clock-names:
    minItems: 10
    maxItems: 13

  cx-supply:
    description:
      reference to the regulators used for the booting of the Hexagon core

  memory-region:
    maxItems: 1

  qcom,halt-regs:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    description:
      A phandle reference to a syscon representing TCSR followed by the three
      offsets within syscon for q6, wcss and nc halt registers.
    items:
      - items:
          - description: phandle to TCSR_MUTEX registers
          - description: offset to the Q6 halt register
          - description: offset to the wcss halt register
          - description: offset to the nc halt register

  qcom,smem-states:
    $ref: /schemas/types.yaml#/definitions/phandle-array
    maxItems: 2
    description: States used by the AP to signal the remote processor

  qcom,smem-state-names:
    maxItems: 2
    description:
      Names of the states used by the AP to signal the remote processor

  glink-edge:
    $ref: /schemas/remoteproc/qcom,glink-edge.yaml#
    description:
      Qualcomm G-Link subnode which represents communication edge, channels
      and devices related to the Modem.

required:
  - compatible
  - reg
  - reg-names
  - interrupts-extended
  - interrupt-names
  - memory-region
  - qcom,halt-regs
  - qcom,smem-states
  - qcom,smem-state-names

allOf:
  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,ipq8074-wcss-pil
    then:
      properties:
        qcom,smem-states:
          items:
            - description: Shutdown Q6
            - description: Stop Q6
        qcom,smem-state-names:
          items:
            - const: shutdown
            - const: stop
        clock-names: false
        clocks: false

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,ipq9574-wcss-pil
    then:
      properties:
        clocks:
          minItems: 13
        clock-names:
          items:
            - const: anoc_wcss_axi_m
            - const: q6_ahb
            - const: q6_ahb_s
            - const: q6_axim
            - const: q6ss_boot
            - const: mem_noc_q6_axi
            - const: sys_noc_wcss_ahb
            - const: wcss_acmt
            - const: wcss_ecahb
            - const: wcss_q6_tbu
            - const: q6_axim2
            - const: wcss_ahb_s
            - const: wcss_axi_m
        qcom,smem-states:
          items:
            - description: Shutdown Q6
            - description: Stop Q6
        qcom,smem-state-names:
          items:
            - const: shutdown
            - const: stop

      required:
        - clocks
        - clock-names

  - if:
      properties:
        compatible:
          contains:
            enum:
              - qcom,qcs404-wcss-pil
    then:
      properties:
        qcom,smem-states:
          maxItems: 1
        qcom,smem-state-names:
          items:
            - const: stop
        clocks:
          minItems: 10
          maxItems: 10
        clock-names:
          items:
            - const: xo
            - const: gcc_abhs_cbcr
            - const: gcc_axim_cbcr
            - const: lcc_ahbfabric_cbc
            - const: tcsr_lcc_cbc
            - const: lcc_abhs_cbc
            - const: lcc_tcm_slave_cbc
            - const: lcc_abhm_cbc
            - const: lcc_axim_cbc
            - const: lcc_bcr_sleep
      required:
        - clocks
        - clock-names
        - cx-supply

additionalProperties: false

examples:
  - |
    #include <dt-bindings/clock/qcom,ipq9574-gcc.h>
    #include <dt-bindings/interrupt-controller/arm-gic.h>
    #include <dt-bindings/reset/qcom,ipq9574-gcc.h>

    q6v5_wcss: remoteproc@cd00000 {
        compatible = "qcom,ipq9574-wcss-pil";
        reg = <0x0cd00000 0x4040>,
              <0x004ab000 0x20>;
        reg-names = "qdsp6", "rmb";

        interrupts-extended = <&intc GIC_SPI 325 IRQ_TYPE_EDGE_RISING>,
                              <&wcss_smp2p_in 0 IRQ_TYPE_NONE>,
                              <&wcss_smp2p_in 1 IRQ_TYPE_NONE>,
                              <&wcss_smp2p_in 2 IRQ_TYPE_NONE>,
                              <&wcss_smp2p_in 3 IRQ_TYPE_NONE>;
        interrupt-names = "wdog", "fatal", "ready",
                          "handover", "stop-ack";

        resets = <&gcc GCC_WCSSAON_RESET>,
                 <&gcc GCC_WCSS_BCR>,
                 <&gcc GCC_WCSS_Q6_BCR>;
        reset-names = "wcss_aon_reset",
                      "wcss_reset",
                      "wcss_q6_reset";

        clocks = <&gcc GCC_ANOC_WCSS_AXI_M_CLK>,
                 <&gcc GCC_Q6_AHB_CLK>,
                 <&gcc GCC_Q6_AHB_S_CLK>,
                 <&gcc GCC_Q6_AXIM_CLK>,
                 <&gcc GCC_Q6SS_BOOT_CLK>,
                 <&gcc GCC_MEM_NOC_Q6_AXI_CLK>,
                 <&gcc GCC_SYS_NOC_WCSS_AHB_CLK>,
                 <&gcc GCC_WCSS_ACMT_CLK>,
                 <&gcc GCC_WCSS_ECAHB_CLK>,
                 <&gcc GCC_WCSS_Q6_TBU_CLK>,
                 <&gcc GCC_WCSS_AHB_S_CLK>,
                 <&gcc GCC_Q6_AXIM2_CLK>,
                 <&gcc GCC_WCSS_AXI_M_CLK>;

        clock-names = "anoc_wcss_axi_m",
                      "q6_ahb",
                      "q6_ahb_s",
                      "q6_axim",
                      "q6ss_boot",
                      "mem_noc_q6_axi",
                      "sys_noc_wcss_ahb",
                      "wcss_acmt",
                      "wcss_ecahb",
                      "wcss_q6_tbu",
                      "q6_axim2",
                      "wcss_ahb_s",
                      "wcss_axi_m";

        qcom,halt-regs = <&tcsr 0x18000 0x1b000 0xe000>;

        qcom,smem-states = <&wcss_smp2p_out 0>,
                           <&wcss_smp2p_out 1>;
        qcom,smem-state-names = "shutdown",
                                "stop";
        memory-region = <&q6_region>;

        glink-edge {
            interrupts = <GIC_SPI 321 IRQ_TYPE_EDGE_RISING>;
            label = "rtr";
            qcom,remote-pid = <1>;
            mboxes = <&apcs_glb 8>;
        };
    };
